<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dentist Appointment</title>
    <meta name="theme-color" content="#f5f5f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Aligner" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="app.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <style>
      @font-face {
        font-family: "TT Norms Pro";
        src: url("/fonts/tt-norms-pro-regular.woff2") format("woff2");
        font-weight: 400;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
        font-family: inherit;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f5f5;
        color: #000;
        font-family: "Avenir Next", "Helvetica Neue", Inter, "TT Norms Pro", ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input {
        font: inherit;
      }

      .page {
        min-height: 100vh;
        padding: 24px;
      }

      @supports (min-height: 100svh) {
        .page {
          min-height: 100svh;
        }
      }

      .inner {
        width: min(88rem, 100%);
        margin: 0 auto;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .logo,
      .icon-button {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: #000;
        color: #fff;
      }

      .logo {
        width: 29px;
        height: 29px;
        border-radius: 9px;
      }

      .brand span {
        font-size: 24px;
        font-weight: 400;
        letter-spacing: -0.04em;
      }

      .hero {
        position: relative;
        min-height: calc(100vh - 96px);
        overflow: hidden;
        border-radius: 16px;
        background:
          radial-gradient(circle at 78% 32%, rgba(255, 255, 255, 0.82) 0 8%, transparent 9%),
          linear-gradient(120deg, #e9ece8 0%, #f7f7f4 44%, #d7d9d1 100%);
        padding: clamp(28px, 6vw, 64px);
      }

      .hero::after {
        content: "";
        position: absolute;
        right: 8%;
        bottom: 8%;
        width: min(36vw, 420px);
        aspect-ratio: 1;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.28);
        box-shadow: inset 0 0 80px rgba(255, 255, 255, 0.55), 0 42px 90px rgba(0, 0, 0, 0.12);
      }

      .content {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: minmax(0, 0.85fr) minmax(0, 1.15fr);
        gap: 18px;
        align-items: start;
      }

      h1,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 620px;
        margin-bottom: 18px;
        font-size: clamp(54px, 7vw, 82px);
        font-weight: 300;
        line-height: 0.94;
        letter-spacing: -0.055em;
      }

      .copy {
        max-width: 470px;
        color: rgba(0, 0, 0, 0.68);
        font-size: 18px;
        line-height: 1.58;
      }

      .panel {
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        padding: 28px;
        backdrop-filter: blur(18px);
      }

      .summary {
        margin-top: 28px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.56);
        padding: 18px;
        color: rgba(0, 0, 0, 0.68);
        line-height: 1.5;
      }

      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 9px;
        color: rgba(0, 0, 0, 0.62);
        font-size: 14px;
      }

      label.wide {
        grid-column: 1 / -1;
      }

      input {
        width: 100%;
        min-height: 52px;
        border: 1px solid #e5e5e5;
        border-radius: 14px;
        background: #f9f9f9;
        color: #000;
        padding: 12px 14px;
        font-size: 17px;
        outline: none;
      }

      input:focus {
        border-color: #000;
        background: #fff;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        grid-column: 1 / -1;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        border: 0;
        border-radius: 999px;
        background: #000;
        color: #fff;
        padding: 10px 26px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
      }

      .secondary {
        border: 1px solid #e5e5e5;
        background: #fff;
        color: #000;
      }

      @media (max-width: 900px) {
        .content,
        form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="inner">
        <nav class="nav">
          <div class="brand">
            <span class="logo" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M6.5 12.3c1.7 2.2 4.1 3.3 7 3.3 1.7 0 3-.3 4-.9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M7 8.4c2.2-1.4 4.8-1.9 7.7-1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span>Aligner</span>
          </div>
          <button class="icon-button" id="backButton" aria-label="Back to tracker" title="Back to tracker">
            <svg viewBox="0 0 24 24" fill="none" width="20" height="20" aria-hidden="true">
              <path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </nav>

        <section class="hero">
          <div class="content">
            <div>
              <h1>Set your next visit.</h1>
              <p class="copy">Enter the tray your dentist wants to see you at, then save the real appointment date once it is booked.</p>
              <div class="summary" id="appointmentSummary">No appointment saved yet.</div>
            </div>

            <form class="panel" id="appointmentForm">
              <label class="wide">
                See dentist at tray
                <input id="targetTray" type="number" min="1" placeholder="Example: 24" />
              </label>
              <label>
                Booked date, optional
                <input id="appointmentDate" type="date" />
              </label>
              <label>
                Booked time, optional
                <input id="appointmentTime" type="time" />
              </label>
              <label>
                Dentist or clinic
                <input id="clinicName" type="text" placeholder="Clinic name" />
              </label>
              <label>
                Notes
                <input id="clinicNotes" type="text" placeholder="Optional" />
              </label>
              <div class="button-row">
                <button class="pill" type="submit">Save appointment</button>
                <button class="pill secondary" id="calendarButton" type="button">Add to calendar</button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <script>
      const KEY = "premiumAlignerTracker";
      const INTERVAL = 10;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const initialAppointment = { targetTray: "", date: "", time: "", clinicName: "", notes: "" };
      const $ = (id) => document.getElementById(id);

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem(KEY)) || {};
        } catch {
          return {};
        }
      }

      let state = loadState();
      state.appointment = { ...initialAppointment, ...(state.appointment || {}) };

      function saveState() {
        localStorage.setItem(KEY, JSON.stringify(state));
      }

      function parseDate(value) {
        const [year, month, day] = value.split("-").map(Number);
        return new Date(year, month - 1, day);
      }

      function addDays(date, days) {
        const next = new Date(date);
        next.setDate(next.getDate() + days);
        return next;
      }

      function fmt(date) {
        return new Intl.DateTimeFormat(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" }).format(date);
      }

      function missedBefore(date) {
        if (!state.startDate) return 0;
        const start = parseDate(state.startDate);
        return [...new Set(state.missedDates || [])].filter((missedDate) => {
          const missed = parseDate(missedDate);
          return missed >= start && missed < date;
        }).length;
      }

      function targetTrayWindow(targetTrayValue) {
        const targetTray = Number(targetTrayValue);
        const currentTray = Number(state.currentTray || 1);
        if (!targetTray || !state.startDate) return null;
        if (targetTray < currentTray) {
          return { error: `Tray ${targetTray} is before your saved current tray, tray ${currentTray}.` };
        }

        const start = parseDate(state.startDate);
        const firstEstimate = addDays(start, (targetTray - currentTray) * INTERVAL);
        const extensionDays = missedBefore(firstEstimate);
        const windowStart = addDays(start, (targetTray - currentTray) * INTERVAL + extensionDays);
        const windowEnd = addDays(windowStart, INTERVAL - 1);

        return {
          targetTray,
          windowStart,
          windowEnd,
          extensionDays,
        };
      }

      function render() {
        $("targetTray").value = state.appointment.targetTray;
        $("appointmentDate").value = state.appointment.date;
        $("appointmentTime").value = state.appointment.time;
        $("clinicName").value = state.appointment.clinicName;
        $("clinicNotes").value = state.appointment.notes;

        const lines = [];
        const trayWindow = targetTrayWindow(state.appointment.targetTray);

        if (trayWindow?.error) {
          lines.push(trayWindow.error);
        } else if (trayWindow) {
          lines.push(`Tray ${trayWindow.targetTray} window: ${fmt(trayWindow.windowStart)} to ${fmt(trayWindow.windowEnd)}.`);
          if (trayWindow.extensionDays) {
            lines.push(`${trayWindow.extensionDays} missed day${trayWindow.extensionDays === 1 ? "" : "s"} already extend this estimate.`);
          }
        }

        if (state.appointment.date) {
          const clinic = state.appointment.clinicName ? `${state.appointment.clinicName}: ` : "";
          const time = state.appointment.time ? ` at ${state.appointment.time}` : "";
          lines.push(`Booked appointment: ${clinic}${fmt(parseDate(state.appointment.date))}${time}.`);
        }

        $("appointmentSummary").textContent = lines.length ? lines.join(" ") : "No appointment saved yet.";
      }

      function calendarEvent() {
        if (!state.appointment.date) {
          alert("Add an appointment date first.");
          return;
        }
        const start = parseDate(state.appointment.date);
        const [hours = 9, minutes = 0] = (state.appointment.time || "09:00").split(":").map(Number);
        start.setHours(hours, minutes, 0, 0);
        const end = new Date(start.getTime() + 45 * 60000);
        const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
        const icsDate = (date) => date.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
        const clean = (value) => String(value || "").replaceAll("\\", "\\\\").replaceAll(",", "\\,").replaceAll(";", "\\;");
        const ics = [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "PRODID:-//Aligner Tracker//EN",
          "BEGIN:VEVENT",
          `UID:${crypto.randomUUID()}@aligner-tracker`,
          `DTSTAMP:${stamp}`,
          `DTSTART:${icsDate(start)}`,
          `DTEND:${icsDate(end)}`,
          `SUMMARY:${clean(state.appointment.clinicName || "Dentist appointment")}`,
          `DESCRIPTION:${clean(state.appointment.notes || "Aligner check-in appointment.")}`,
          "END:VEVENT",
          "END:VCALENDAR",
        ].join("\\r\\n");
        const blob = new Blob([ics], { type: "text/calendar" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "dentist-appointment.ics";
        link.click();
        URL.revokeObjectURL(link.href);
      }

      $("appointmentForm").addEventListener("submit", (event) => {
        event.preventDefault();
        state.appointment = {
          targetTray: $("targetTray").value,
          date: $("appointmentDate").value,
          time: $("appointmentTime").value,
          clinicName: $("clinicName").value.trim(),
          notes: $("clinicNotes").value.trim(),
        };
        saveState();
        render();
      });

      $("calendarButton").addEventListener("click", calendarEvent);
      $("backButton").addEventListener("click", () => {
        window.location.href = "index.html";
      });

      render();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
